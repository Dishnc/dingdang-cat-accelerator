name: Dingdang Legacy XTLS Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build-debug-apk:
    name: Build Legacy XTLS Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-30" "build-tools;30.0.2" "platform-tools"

      - name: Build Debug APK
        run: |
          cd ${{ github.workspace }}/V2rayNG
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          chmod 755 gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Locate APK files
        run: |
          find ${{ github.workspace }}/V2rayNG -name "*.apk" -type f -print

      - name: Prepare universal APK
        run: |
          mkdir -p ${{ github.workspace }}/artifact
          cp ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/debug/*universal*.apk ${{ github.workspace }}/artifact/DingdangCat_LegacyXTLS_V1.0_universal.apk

      - name: Upload Legacy XTLS APK
        uses: actions/upload-artifact@v4
        with:
          name: DingdangCat_LegacyXTLS_V1.0_universal_apk
          path: artifact/DingdangCat_LegacyXTLS_V1.0_universal.apk
          if-no-files-found: error
