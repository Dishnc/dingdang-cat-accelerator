name: Dingdang Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build-playstore-arm64-debug-apk:
    name: Build Playstore arm64-v8a Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK and NDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-37.0" "build-tools;37.0.0" "platform-tools" "ndk;29.0.14206865"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Set app NDK version
        run: |
          sed -i '10i\  ndkVersion = "29.0.14206865"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

      - name: Restore cached libhevtun
        id: cache-libhevtun-restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/libs
          key: libhevtun-${{ runner.os }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

      - name: Build libhevtun
        if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
        run: |
          bash compile-hevtun.sh

      - name: Save libhevtun
        if: steps.cache-libhevtun-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/libs
          key: libhevtun-${{ runner.os }}-${{ hashFiles('.git/modules/hev-socks5-tunnel/HEAD') }}-${{ hashFiles('compile-hevtun.sh') }}

      - name: Copy libhevtun
        run: |
          cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

      - name: Fetch AndroidLibXrayLite tag
        run: |
          pushd AndroidLibXrayLite
          CURRENT_TAG=$(git describe --tags --abbrev=0)
          echo "CURRENT_TAG=$CURRENT_TAG" >> $GITHUB_ENV
          popd

      - name: Download libv2ray
        uses: robinraju/release-downloader@v1.13
        with:
          repository: '2dust/AndroidLibXrayLite'
          tag: ${{ env.CURRENT_TAG }}
          fileName: 'libv2ray.aar'
          out-file-path: V2rayNG/app/libs/

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Playstore arm64-v8a Debug APK only
        run: |
          cd ${{ github.workspace }}/V2rayNG
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          chmod 755 gradlew
          ./gradlew :app:assemblePlaystoreDebug -PABI_FILTERS=arm64-v8a --stacktrace --no-daemon

      - name: Locate target APK
        run: |
          echo "Target APK files:"
          find ${{ github.workspace }}/V2rayNG/app/build/outputs/apk/playstore/debug -name "*arm64-v8a*.apk" -type f -print

      - name: Upload Playstore arm64-v8a Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dingdang-playstore-arm64-v8a-debug-apk
          path: V2rayNG/app/build/outputs/apk/playstore/debug/*arm64-v8a*.apk
          if-no-files-found: error
